<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Medicamento</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#E3F2FD,#BBDEFB);
    min-height:100vh;
    font-family: 'Segoe UI', sans-serif;
}

.card{
    border-radius:20px;
    border:none;
    background:white;
}

.titulo{
    color:#0277BD;
    font-weight:bold;
    text-transform:uppercase;
    letter-spacing:2px;
}

.medicamento-img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:50%;
    border:3px solid #4FC3F7;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

#alertaMedicamento{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:9999;
    width:90%;
    max-width:450px;
}

.alerta-img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid #dc3545;
}

footer{
    color:#01579B;
    font-weight:bold;
}

.form-label{
    color:#0277BD;
    font-weight:600;
}

.form-control{
    border-radius:12px;
    border:2px solid #B3E5FC;
}

.form-control:focus{
    border-color:#29B6F6;
    box-shadow:0 0 8px rgba(41,182,246,.5);
}

.btn-success{
    background:#00ACC1;
    border:none;
    border-radius:12px;
    font-weight:bold;
}

.btn-success:hover{
    background:#00838F;
}

.btn-danger{
    border-radius:12px;
}

.card-header{
    font-size:1.2rem;
    font-weight:bold;
}

h4{
    color:#0277BD;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            💊 Registrar Medicamento
        </h2>

        <input
            type="text"
            id="medicamento"
            class="form-control mb-3"
            placeholder="Nombre del medicamento">

        <input
            type="text"
            id="dosis"
            class="form-control mb-3"
            placeholder="Dosis">

        <input
            type="time"
            id="hora"
            class="form-control mb-3">

        <input
            type="file"
            id="imagenMedicamento"
            class="form-control mb-3"
            accept="image/*">

        <button
            class="btn btn-success"
            onclick="guardarMedicamento()">

            Guardar Medicamento
        </button>

    </div>

</div>

<script>

function guardarMedicamento(){

    let nombre =
    document.getElementById("medicamento").value;

    let dosis =
    document.getElementById("dosis").value;

    let hora =
    document.getElementById("hora").value;

    let archivo =
    document.getElementById("imagenMedicamento").files[0];

    if(nombre==="" || dosis==="" || hora===""){
        alert("Completa todos los campos");
        return;
    }

    let lector = new FileReader();

    lector.onload = function(e){

        let medicamento = {

            nombre:nombre,
            dosis:dosis,
            hora:hora,
            imagen:e.target.result

        };

        localStorage.setItem(
            "medicamentoActual",
            JSON.stringify(medicamento)
        );

        window.location.href =
        "recordatorio.html";
    };

    if(archivo){
        lector.readAsDataURL(archivo);
    }else{

        localStorage.setItem(
            "medicamentoActual",
            JSON.stringify({
                nombre:nombre,
                dosis:dosis,
                hora:hora,
                imagen:"https://cdn-icons-png.flaticon.com/512/2966/2966486.png"
            })
        );

        window.location.href =
        "recordatorio.html";
    }
}

</script>

</body>
</html>
